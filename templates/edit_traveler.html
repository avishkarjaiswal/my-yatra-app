{% extends 'base.html' %}

{% block title %}Edit Traveler - Krishna Conscious Yatra{% endblock %}

{% block content %}
<section class="py-5 mt-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card glassmorphism p-4 p-md-5">
                    <div
                        class="d-flex justify-content-between align-items-center mb-4 border-bottom border-warning pb-3">
                        <h2 class="mb-0" style="font-weight: 700; color: #fff;">
                            <i class="bi bi-pencil-square me-2" style="color: #ffc107;"></i>Edit Traveler
                        </h2>
                        <a href="{{ url_for('dashboard') }}" class="btn btn-outline-warning btn-sm">
                            <i class="bi bi-arrow-left me-1"></i>Back to Dashboard
                        </a>
                    </div>

                    <form action="{{ url_for('edit_traveler', traveler_id=traveler.id) }}" method="POST"
                        enctype="multipart/form-data">

                        <!-- Photo Upload -->
                        <div class="mb-4">
                            <label class="form-label d-block" for="photo">
                                <i class="bi bi-camera-fill me-2" style="color: #ffc107;"></i>Passport Photo <small
                                    class="text-white-50">(max 350 KB)</small>
                            </label>
                            {% if traveler.photo %}
                            <div class="mb-3" id="current-photo-container">
                                <img src="{{ url_for('static', filename=traveler.photo) }}" alt="Current Photo"
                                    class="img-thumbnail" style="max-height: 120px; border-color: rgba(255,193,7,0.5);">
                                <small class="text-white-50 ms-2 d-block mt-1">Current photo</small>
                            </div>
                            {% endif %}
                            <input type="file" class="form-control" id="photo" name="photo" accept="image/*">
                            <div class="mt-3" id="preview-container" style="display: none;">
                                <img id="photo-preview" src="#" alt="New Photo Preview" class="img-thumbnail"
                                    style="max-height: 120px; border-color: rgba(40,167,69,0.5);">
                                <small class="text-success ms-2 d-block mt-1">New photo to replace</small>
                            </div>
                        </div>

                        <!-- Name & Aadhar -->
                        <div class="row mb-3">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <label class="form-label" for="name">
                                    <i class="bi bi-person-fill me-2" style="color: #ffc107;"></i>Full Name *
                                </label>
                                <input type="text" class="form-control" id="name" name="name" required
                                    value="{{ traveler.name }}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" for="aadhar">
                                    <i class="bi bi-card-text me-2" style="color: #ffc107;"></i>Aadhar Number
                                </label>
                                <input type="text" class="form-control" id="aadhar" name="aadhar"
                                    value="{{ traveler.aadhar if traveler.aadhar else '' }}"
                                    placeholder="12-digit Aadhar" pattern="\d{12}"
                                    title="Aadhar number must be exactly 12 digits" maxlength="12">
                            </div>
                        </div>

                        <!-- Age & Gender -->
                        <div class="row mb-3">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <label class="form-label" for="year_of_birth">
                                    <i class="bi bi-calendar-event-fill me-2" style="color: #ffc107;"></i>Year of Birth
                                    *
                                </label>
                                <input type="number" class="form-control" id="year_of_birth" name="year_of_birth"
                                    required min="1900" max="{{ current_year }}"
                                    value="{{ traveler.year_of_birth if traveler.year_of_birth else '' }}"
                                    placeholder="e.g. 1990">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" for="gender">
                                    <i class="bi bi-gender-ambiguous me-2" style="color: #ffc107;"></i>Gender *
                                </label>
                                <select class="form-control" id="gender" name="gender" required
                                    style="appearance: auto;">
                                    <option value="Male" {% if traveler.gender=='Male' %}selected{% endif %}>Male
                                    </option>
                                    <option value="Female" {% if traveler.gender=='Female' %}selected{% endif %}>Female
                                    </option>
                                    <option value="Other" {% if traveler.gender=='Other' %}selected{% endif %}>Other
                                    </option>
                                </select>
                            </div>
                        </div>

                        <!-- Email & Alt Phone -->
                        <div class="row mb-3">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <label class="form-label" for="email">
                                    <i class="bi bi-envelope-fill me-2" style="color: #ffc107;"></i>Email Address
                                </label>
                                <input type="email" class="form-control" id="email" name="email"
                                    value="{{ traveler.email if traveler.email else '' }}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" for="alternative_phone">
                                    <i class="bi bi-telephone-fill me-2" style="color: #ffc107;"></i>Alternative Phone
                                    No.
                                </label>
                                <input type="tel" class="form-control" id="alternative_phone" name="phone"
                                    value="{{ traveler.phone if traveler.phone else '' }}" placeholder="10-digit phone"
                                    pattern="\d{10}" title="Phone number must be exactly 10 digits" maxlength="10">
                            </div>
                        </div>

                        <!-- Location -->
                        <div class="row mb-4">
                            <div class="col-md-4 mb-3 mb-md-0">
                                <label class="form-label" for="state">
                                    <i class="bi bi-map-fill me-2" style="color: #ffc107;"></i>State *
                                </label>
                                <select class="form-control" id="state" name="state" required style="appearance: auto;"
                                    data-selected="{{ traveler.state if traveler.state else '' }}">
                                    <option value="" disabled selected>Select State</option>
                                </select>
                            </div>
                            <div class="col-md-4 mb-3 mb-md-0">
                                <label class="form-label" for="district">
                                    <i class="bi bi-geo-alt-fill me-2" style="color: #ffc107;"></i>District *
                                </label>
                                <select class="form-control" id="district" name="district" required disabled
                                    style="appearance: auto;"
                                    data-selected="{{ traveler.district if traveler.district else '' }}">
                                    <option value="" disabled selected>Select District</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label" for="city">
                                    <i class="bi bi-building me-2" style="color: #ffc107;"></i>City *
                                </label>
                                <input type="text" class="form-control" id="city" name="city" placeholder="City"
                                    value="{{ traveler.city if traveler.city else '' }}" required>
                            </div>
                        </div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary btn-lg"
                                style="background: linear-gradient(90deg, #ff512f, #dd2476); border: none; font-weight: 600;">
                                <i class="bi bi-check-circle-fill me-2"></i>Update Traveler
                            </button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

<style>
    .form-control {
        background: rgba(0, 0, 0, 0.3) !important;
        border: 1px solid rgba(255, 255, 255, 0.2) !important;
        color: white !important;
        border-radius: 8px !important;
        padding: 12px 15px !important;
        transition: all 0.3s ease !important;
    }

    .form-control:focus {
        background: rgba(0, 0, 0, 0.4) !important;
        border-color: #ffc107 !important;
        box-shadow: 0 0 0 0.2rem rgba(255, 193, 7, 0.15) !important;
    }

    .form-control::placeholder {
        color: rgba(255, 255, 255, 0.4) !important;
    }

    .form-label {
        font-weight: 500;
        margin-bottom: 8px;
    }
</style>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const stateSelect = document.getElementById('state');
        const districtSelect = document.getElementById('district');

        // Getting pre-selected values for edit flow
        const selectedStateVal = stateSelect.getAttribute('data-selected') || '';
        const selectedDistrictVal = districtSelect.getAttribute('data-selected') || '';

        fetch('{{ url_for("static", filename="state_district.json") }}')
            .then(r => r.json())
            .then(data => {
                const states = data.states;

                // Populate states
                states.forEach(stateObj => {
                    const option = document.createElement('option');
                    option.value = stateObj.state;
                    option.textContent = stateObj.state;
                    if (selectedStateVal === stateObj.state) {
                        option.selected = true;
                    }
                    stateSelect.appendChild(option);
                });

                // Function to populate districts based on state
                function populateDistricts(stateName, districtToSelect) {
                    districtSelect.innerHTML = '<option value="" disabled selected>Select District</option>';
                    const stateData = states.find(s => s.state === stateName);
                    if (stateData) {
                        stateData.districts.forEach(district => {
                            const option = document.createElement('option');
                            option.value = district;
                            option.textContent = district;
                            if (districtToSelect === district) {
                                option.selected = true;
                            }
                            districtSelect.appendChild(option);
                        });
                        districtSelect.disabled = false;
                    } else {
                        districtSelect.disabled = true;
                    }
                }

                // If editing, initialize districts for the selected state
                if (selectedStateVal) {
                    populateDistricts(selectedStateVal, selectedDistrictVal);
                }

                stateSelect.addEventListener('change', function () {
                    populateDistricts(this.value, '');
                });
            })
            .catch(error => console.error('Error fetching state data:', error));

        const photoInput = document.getElementById('photo');
        const photoPreview = document.getElementById('photo-preview');
        const previewContainer = document.getElementById('preview-container');
        const currentPhotoContainer = document.getElementById('current-photo-container');

        if (photoInput && photoPreview) {
            photoInput.addEventListener('change', function () {
                const file = this.files[0];
                if (file) {
                    // Check size
                    if (file.size > 350 * 1024) {
                        alert('Image size exceeds 350 KB! Please choose a smaller file.');
                        this.value = ''; // clear
                        photoPreview.src = '#';
                        previewContainer.style.display = 'none';
                        if (currentPhotoContainer) currentPhotoContainer.style.display = 'block';
                        return;
                    }
                    // Preview
                    const url = URL.createObjectURL(file);
                    photoPreview.src = url;
                    previewContainer.style.display = 'block';
                    if (currentPhotoContainer) currentPhotoContainer.style.display = 'none';
                    photoPreview.onload = () => URL.revokeObjectURL(photoPreview.src);
                } else {
                    photoPreview.src = '#';
                    previewContainer.style.display = 'none';
                    if (currentPhotoContainer) currentPhotoContainer.style.display = 'block';
                }
            });
        }
    });
</script>
{% endblock %}
